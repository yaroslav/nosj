name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64: executes the SSE2 and AVX2 kernels against the scalar
          # reference cross-checks (AVX2 is available on GitHub runners).
          - os: ubuntu-latest
          # aarch64: executes the NEON kernels.
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --all-features -- -D warnings
      # Debug first: keeps debug_assert! checks (flatten capacity, packed
      # length bound) active; then release for optimized-codegen coverage.
      - run: cargo test
      - run: cargo test --release
      - run: cargo test --release --all-features

  # SSE2-only coverage: Rosetta 2 on the arm64 macOS runners executes
  # x86_64 binaries but cannot execute AVX2, so runtime detection takes
  # the SSE2 paths — a configuration the runners can't reach natively.
  sse2:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --target x86_64-apple-darwin

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.97"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --all-features

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run

  # Short fuzz runs as a smoke test — long campaigns run on demand or on
  # the weekly schedule via fuzz.yml. Each target gets 60 seconds; a
  # finding fails the job and uploads the input as an artifact.
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [parse_differential, roundtrip, vs_serde, pointer_differential]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=60
        env:
          RUST_BACKTRACE: "1"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
